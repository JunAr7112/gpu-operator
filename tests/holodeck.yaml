apiVersion: holodeck.nvidia.com/v1alpha1
kind: Environment
metadata:
  name: HOLODECK_NAME
  description: "end-to-end test infrastructure"
spec:
  provider: aws
  auth:
    keyName: cnt-ci
    privateKey: HOLODECK_PRIVATE_KEY
  instance:
    type: g4dn.xlarge
    region: us-west-1
    image:
      architecture: amd64
      imageId: ami-07c175e73e37b02df
  containerRuntime:
    install: true
    name: containerd
    version: 2.2.3
  kubernetes:
    install: true
    installer: kubeadm
    version: v1.35.4
    crictlVersion: v1.35.0
    calicoVersion: v3.31.5
